name: Static Checks

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  python-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff==0.12.12

      - name: Lint owned Python surfaces
        run: |
          python -m ruff check source/isaaclab_imitation docker \
            --exclude source/isaaclab_imitation/test_reference_patch_env.py \
            --ignore F403

      - name: Byte-compile owned Python surfaces
        run: |
          python -m compileall -q docker source/isaaclab_imitation/isaaclab_imitation
